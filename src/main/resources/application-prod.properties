# ===== CurePulse HMS — Production Configuration =====
# This file is active when spring.profiles.active=prod
# All sensitive values are injected via Cloud Run environment variables
# Never commit real credentials to source control

# --- Server ---
server.port=${PORT:8080}

# --- MySQL (Cloud SQL via Cloud Run connector) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- HikariCP Connection Pool (optimized for Cloud Run) ---
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.initialization-fail-timeout=-1

# --- Swagger / OpenAPI ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# --- Logging (minimal in production) ---
logging.level.root=WARN
logging.level.com.example=INFO
