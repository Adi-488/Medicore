# ===== CurePulse HMS — Patient Service Production Configuration =====
# This file is active when spring.profiles.active=prod
# All sensitive values are injected via Cloud Run environment variables
# Never commit real credentials to source control

# --- Server ---
server.port=${PORT:8082}

# --- MySQL (Cloud SQL via Cloud Run connector) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# --- HikariCP Connection Pool (optimized for Cloud Run) ---
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1

# --- Service Discovery Client ---
# Google Cloud Run uses dynamic routing, so local Eureka is disabled by default
eureka.client.enabled=${EUREKA_CLIENT_ENABLED:false}
