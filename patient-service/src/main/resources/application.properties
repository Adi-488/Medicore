# ===== CurePulse HMS — Patient Service Configuration =====

# --- Server Configuration ---
server.port=8082

# --- Application Metadata ---
spring.application.name=patient-service

# --- MySQL Database Configuration ---
spring.datasource.url=jdbc:mysql://localhost:3306/patient_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=Aditya@2005

# --- JPA / Hibernate ---
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.initialization-fail-timeout=-1

# --- Service Discovery Client ---
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
